<!DOCTYPE html>
<html>
<head>
    <title>Super Admin Login</title>
	<link rel="stylesheet" href="style.css">
</head>
<body class="super-admin-page">

<div class="super-admin-container">
   <h2>👑 Super Admin Login</h2>

    <input type="text" id="superUser" placeholder="Username">
    <input type="password" id="superPass" placeholder="Password">

    <button onclick="loginSuperAdmin()">Login</button>
</div>

<script>
function loginSuperAdmin() {

    let user = document.getElementById("superUser").value.trim().toLowerCase();
    let pass = document.getElementById("superPass").value.trim();

    if (user === "superadmin" && pass === "1234") {

        // ✅ DO NOT CLEAR EVERYTHING
        localStorage.removeItem("isLoggedIn");
        localStorage.removeItem("adminLoggedIn");

        localStorage.setItem("loginType", "superadmin");
        localStorage.setItem("superAdminLoggedIn", "true");

        alert("Super Admin Login Successful 👑");

        window.location.href = "index.html";

    } else {
        alert("Invalid credentials ❌");
    }
}
</script>

</body>
</html>
