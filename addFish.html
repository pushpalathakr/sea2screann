<!DOCTYPE html>
<html>
<head>
    <title>Add Fish</title>
	<link rel="stylesheet" href="style.css">
</head>
<body class="add-fish-page">
<div class="add-container">

<h2>➕ Add New Fish</h2>

<input type="file" id="fishImg"><br><br>
<input type="text" id="fishName" placeholder="Fish Name"><br><br>
<input type="text" id="fishQty" placeholder="Quantity"><br><br>
<input type="text" id="fishPrice" placeholder="Price"><br><br>
<input type="text" id="fishExpire" placeholder="Expire Days"><br><br>
<textarea id="fishDesc" placeholder="Description"></textarea><br><br>

<button onclick="addFish()">Add Fish ✅</button>
<button onclick="goBack()">⬅ Back</button>
</div>
<script src="addFish.js"></script>

</body>
</html>
