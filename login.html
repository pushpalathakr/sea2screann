<!DOCTYPE html>
<html>
<head>
    <title>Login Selection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-page">

<div class="container">

    <h2>Select Login Type</h2>

    <!-- USER LOGIN -->
    <div id="userLoginBox">
        <h3>User Login</h3>

        <input type="text" id="userId" placeholder="User ID">
        <input type="password" id="password" placeholder="Password">

        <button onclick="loginUser()">Login as User</button>
    </div>

    <hr style="margin:20px 0;">

    <!-- ADMIN OPTION -->
    <div>
        <h3>Admin?</h3>
        <button onclick="goAdmin()">Go to Admin Login</button>
    </div>

    <!-- SUPER ADMIN OPTION -->
<div style="margin-top:20px;">
    <h3>Super Admin?</h3>
    <button onclick="goSuperAdmin()">Go to Super Admin Login</button>
</div>

</div>

<script>
function loginUser() {
    let user = document.getElementById("userId").value.trim();
    let pass = document.getElementById("password").value.trim();

    if (user && pass) {

        // ✅ CLEAR OLD SESSIONS
        localStorage.removeItem("adminLoggedIn");
        localStorage.removeItem("superAdminLoggedIn");

        localStorage.setItem("isLoggedIn", "true");

        // 🔥 👉 ADD HERE (IMPORTANT FIX)
        localStorage.setItem("username", user.toLowerCase().trim());

        localStorage.setItem("loginType", "user");

        alert("User login successful ✅");
        window.location.href = "index.html";
    } else {
        alert("Enter details ❌");
    }
}
function goAdmin() {
    localStorage.removeItem("isLoggedIn");
    localStorage.removeItem("superAdminLoggedIn");

    localStorage.setItem("loginType", "admin");
    window.location.href = "admin_login.html";
}

function goSuperAdmin() {
    localStorage.removeItem("isLoggedIn");
    localStorage.removeItem("adminLoggedIn");

    localStorage.setItem("loginType", "superadmin");
    window.location.href = "super_admin_login.html";
}
</script>

</body>
</html>
